name: Build Flet APK

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Verify Files
        run: |
          echo "Current directory:"
          pwd
          echo "Files present:"
          ls -la
          if [ -f "flet.yaml" ]; then echo "flet.yaml found"; else echo "ERROR: flet.yaml missing"; fi
          if [ -f "MyScreen_ACOW_v3.py" ]; then echo "Python file found"; else echo "ERROR: Python file missing"; fi

      - name: Build APK
        run: |
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/*/apk/*.apk
