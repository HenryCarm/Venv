name: Build Flet APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This allows you to click the button manually

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        run: |
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-flet-app
          path: build/*/apk/*.apk
