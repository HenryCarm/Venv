name: Build Flet APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Debug Files
        run: |
          echo "Current Directory:"
          pwd
          echo "Listing files:"
          ls -la
          if [ -f "flet.yaml" ]; then
            echo "flet.yaml found!"
            cat flet.yaml
          else
            echo "ERROR: flet.yaml NOT found!"
            exit 1
          fi

      - name: Build APK
        run: flet build apk --module-name MyScreen_ACOW_v3 --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-flet-app-apk
          path: build/**/apk/*.apk
          retention-days: 5
