name: Build Flet APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Check Files
        run: |
          ls -la
          cat flet.yaml

      - name: Build APK
        run: |
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/*/apk/*.apk
